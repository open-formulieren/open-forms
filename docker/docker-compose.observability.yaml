---

# Taken and adapted from https://grafana.com/docs/loki/latest/setup/install/docker/#install-with-docker-compose

services:
  # logs storage
  loki:
    image: grafana/loki:latest
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - open-forms-dev

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-tsdb:/prometheus
    networks:
      - open-forms-dev

  # log scraping from container output
  promtail:
    image: grafana/promtail:latest
    volumes:
      # for service discovery & reading container logs - note that doing this in
      # production is NOT recommended due to security concerns
      - /var/run/docker.sock:/var/run/docker.sock:ro
      # custom config file to scrape container logs
      - ./observability/promtail/config.yml:/etc/promtail/config.yml
      - promtail-logs:/var/log
    command: -config.file=/etc/promtail/config.yml
    networks:
      - open-forms-dev

  # open telemetry collector, receives metrics from the application instance(s)
  otel-collector:
    image: otel/opentelemetry-collector:latest
    command: --config=/etc/otel-collector-config.yaml
    volumes:
      - ./observability/otel/otel-collector-config.yml:/etc/otel-collector-config.yaml
    ports:
      - 4317:4317
      - 4318:4318
      - 8889:8889
    networks:
      - open-forms-dev

  # dashboard tool, visualizes telemetry. queries loki and prometheus
  grafana:
    environment:
      - GF_PATHS_PROVISIONING=/etc/grafana/provisioning
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_FEATURE_TOGGLES_ENABLE=alertingSimplifiedRouting,alertingQueryAndExpressionsStepMode
    entrypoint:
      - sh
      - -euc
      - |
        mkdir -p /etc/grafana/provisioning/datasources
        cat <<EOF > /etc/grafana/provisioning/datasources/ds.yaml
        apiVersion: 1
        datasources:
        - name: Loki
          type: loki
          access: proxy 
          orgId: 1
          url: http://loki:3100
          basicAuth: false
          isDefault: true
          version: 1
          editable: false
        - name: Prometheus
          type: prometheus
          access: proxy
          url: http://prometheus:9090
          jsonData:
            httpMethod: POST
            manageAlerts: false
            allowAsRecordingRulesTarget: false
            prometheusType: Prometheus
            prometheusVersion: 3.5.0
            cacheLevel: 'Low'
            disableRecordingRules: false
            timeInterval: 15s   # Prometheus scrape interval
            incrementalQueryOverlapWindow: 10m
        EOF
        /run.sh
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    networks:
      - open-forms-dev

volumes:
  promtail-logs:
  prometheus-tsdb:

networks:
  open-forms-dev:
    name: open-forms-dev
