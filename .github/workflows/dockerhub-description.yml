name: Generate and update Docker Hub description

on:
  workflow_dispatch:
    inputs:
      image_name:
        type: string
        default: openformulieren/open-forms
  workflow_call:
    inputs:
      image_name:
        required: true
        type: string
    secrets:
      DOCKER_USERNAME:
        required: true
      DOCKER_TOKEN:
        required: true

jobs:
  update-docker-readme:
    name: Generate and update Docker Hub description
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6
      - name: Generate Docker Hub README
        run: |
          uv run \
            ./docker/ci/generate_dockerhub_description.py \
            "${GITHUB_REF_NAME}"
      - name: Update Docker Hub description
        uses: peter-evans/dockerhub-description@432a30c9e07499fd01da9f8a49f0faf9e0ca5b77 # v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}
          repository: ${{ inputs.image_name }}
          readme-filepath: './docker/ci/README.md'
