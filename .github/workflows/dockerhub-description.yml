name: Generate and update Docker Hub description

on:
  workflow_dispatch:
    inputs:
      image_name:
        type: string
        default: openformulieren/open-forms
  workflow_call:
    inputs:
      image_name:
        required: true
        type: string
    secrets:
      DOCKER_USERNAME:
        required: true
      DOCKER_TOKEN:
        required: true

jobs:
  update-docker-readme:
    name: Generate and update Docker Hub description
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: false
      - name: Generate Docker Hub README
        run: |
          uv run \
            ./docker/ci/generate_dockerhub_description.py \
            "${{ github.ref_name }}"
      - name: Update Docker Hub description
        uses: peter-evans/dockerhub-description@1b9a80c056b620d92cedb9d9b5a223409c68ddfa # v5.0.0
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}
          repository: ${{ inputs.image_name }}
          readme-filepath: './docker/ci/README.md'
